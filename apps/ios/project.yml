name: Lume
options:
  bundleIdPrefix: com.ewen
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  # i18n : le français est la langue source ; l'anglais est la 1re traduction.
  developmentLanguage: fr
  knownRegions: [fr, en, Base]

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""            # ← Renseigne ton Team ID Apple Developer

targets:
  Lume:
    type: application
    platform: iOS
    sources:
      - path: Lume
    # Secrets API (URL + jeton) lus depuis un .xcconfig NON versionné.
    # Copie Lume/Secrets.xcconfig.example → Lume/Secrets.xcconfig avant de générer.
    configFiles:
      Debug: Lume/Secrets.xcconfig
      Release: Lume/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ewen.lume     # ← adapte si besoin
        CODE_SIGN_ENTITLEMENTS: Lume.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"                   # iPhone uniquement
        # i18n : extrait les littéraux Text("…")/Button("…") vers le String Catalog au build,
        # et active la localisation automatique des Text SwiftUI.
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LOCALIZED_STRING_SWIFTUI_SUPPORT: "YES"
    info:
      path: Lume/Info.plist
      properties:
        CFBundleDisplayName: Lume
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # i18n : français par défaut, anglais disponible.
        CFBundleDevelopmentRegion: fr
        CFBundleLocalizations: [fr, en]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Permissions (obligatoires pour caméra / photos / Santé)
        NSCameraUsageDescription: "Lume utilise l'appareil photo pour photographier tes repas et scanner les codes-barres, afin d'en estimer les calories et macros."
        NSPhotoLibraryUsageDescription: "Lume accède à une photo de ton choix pour analyser un repas depuis ta galerie. Aucune autre photo n'est lue."
        NSHealthShareUsageDescription: "Lume lit ton poids et ton énergie active depuis Apple Santé pour calculer tes objectifs et afficher ta progression. Ces données restent sur ton appareil."
        NSHealthUpdateUsageDescription: "Lume enregistre tes repas, ton eau, ton poids et tes séances dans Apple Santé pour garder tes données de santé centralisées et à jour."
        # CloudKit : notifications distantes en arrière-plan
        # ⚠️ Désactivé pour Personal Team (compte gratuit) — réactiver avec un compte payant.
        # UIBackgroundModes: [remote-notification]
        # Config API : valeurs injectées depuis Secrets.xcconfig (non versionné), pas en clair ici.
        LUME_API_BASE_URL: "$(LUME_API_BASE_URL)"
        LUME_API_TOKEN: "$(LUME_API_TOKEN)"

  LumeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumeTests
    dependencies:
      - target: Lume
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ewen.lume.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Lume:
    build:
      targets:
        Lume: all
        LumeTests: [test]
    test:
      targets:
        - LumeTests
